name: 🚀 CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ─── JOB 1: Backend Tests ───────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: 📥 Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: 🧪 Run pytest
        run: |
          cd backend
          pytest --tb=short -q
        env:
          FLASK_CONFIG: testing
          FLASK_APP: app.py

  # ─── JOB 2: Frontend Tests ──────────────────────────────────────
  test-frontend:
    name: 🧪 Frontend Tests (vitest)
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📥 Install dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: 🧪 Run vitest
        run: |
          cd frontend
          npm test

  # ─── JOB 3: Deploy (faqat testlar o'tsa) ───────────────────────
  deploy:
    name: 🚢 Deploy to EC2
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Write .env to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            mkdir -p ~/Fashion/backend
            cat > ~/Fashion/backend/.env << EOF
            FLASK_ENV=production
            FLASK_CONFIG=production
            FLASK_APP=app.py
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            PORT=5000
            EOF

      - name: 📥 Pull latest code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/Fashion
            git pull origin main
            echo "Commit: $(git log -1 --format='%h — %s — %ar')"

      - name: 🛑 Stop old containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/Fashion
            docker compose down --remove-orphans

      - name: 🔨 Build & start containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            cd ~/Fashion
            docker compose up -d --build

      - name: 🔍 Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/Fashion
            sleep 8
            docker compose ps
            docker compose logs backend --tail 10

      - name: ✅ Deploy summary
        run: |
          echo "### Deploy natijasi" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌿 Branch | \`main\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 👤 Author | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 💬 Message | ${{ github.event.head_commit.message }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 URL | https://vetement.duckdns.org |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏱️ Time | $(date '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**✅ Testlar o'tdi va deploy muvaffaqiyatli yakunlandi!**" >> $GITHUB_STEP_SUMMARY
