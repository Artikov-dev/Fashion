name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write backend .env to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # .env faylini yaratish — SECRET_KEY va JWT_SECRET_KEY GitHub Secrets dan keladi
            cat > ~/Fashion/backend/.env <<'ENVEOF'
            FLASK_ENV=production
            FLASK_CONFIG=production
            FLASK_APP=app.py
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            DATABASE_URL=postgresql://fashion_user:fashion_password@db:5432/fashion_shop
            ENVEOF
            echo ".env yaratildi"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            echo "====== Deploy started: $(date) ======"

            cd ~/Fashion

            echo "------ Pulling latest code ------"
            git pull origin main

            echo "------ Stopping old containers ------"
            docker-compose down

            echo "------ Building and starting containers ------"
            docker-compose up -d --build

            echo "------ Waiting for containers ------"
            sleep 8
            docker-compose ps

            echo "====== Deploy finished: $(date) ======"
