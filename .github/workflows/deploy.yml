name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH into EC2 and create hello.txt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "====== Deploy started: $(date) ======"

            # Hello.txt fayl yaratish
            echo "Hello from GitHub Actions! Deploy time: $(date)" > /home/$USER/hello.txt

            echo "hello.txt muvaffaqiyatli yaratildi:"
            cat /home/$USER/hello.txt

            echo "====== Deploy finished ======"
