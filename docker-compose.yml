services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - FLASK_ENV=production
      - FLASK_CONFIG=production
    volumes:
      - sqlite_data:/app/instance

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
